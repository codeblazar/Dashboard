name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/feeds.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-feeds
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        run: node scripts/fetch-feeds.mjs

      - name: Commit updated feeds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/feeds.json
          git diff --staged --quiet || git commit -m "chore: update feeds.json [skip ci]"
          git push
